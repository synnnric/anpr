<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#0f1722"/>
  <!-- scan grid -->
  <g stroke="#1f3247" stroke-width="0.6">
    <path d="M0 20 H100 M0 40 H100 M0 60 H100 M0 80 H100"/>
    <path d="M20 0 V100 M40 0 V100 M60 0 V100 M80 0 V100"/>
  </g>
  <!-- vehicle underside outline -->
  <g fill="none" stroke="#5fb0d8" stroke-width="1.6" stroke-linejoin="round">
    <rect x="30" y="14" width="40" height="72" rx="10"/>
    <line x1="30" y1="40" x2="70" y2="40"/>
    <line x1="30" y1="60" x2="70" y2="60"/>
    <rect x="40" y="44" width="20" height="12" rx="2"/>
  </g>
  <!-- wheels -->
  <g fill="#3a4a5c">
    <rect x="23" y="22" width="6" height="12" rx="3"/>
    <rect x="71" y="22" width="6" height="12" rx="3"/>
    <rect x="23" y="66" width="6" height="12" rx="3"/>
    <rect x="71" y="66" width="6" height="12" rx="3"/>
  </g>
  <!-- scan beam -->
  <rect x="0" y="48" width="100" height="4" fill="#5fb0d8" opacity="0.25"/>
</svg>
